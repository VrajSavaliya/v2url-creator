<!DOCTYPE html>
<html>
<head>
<title>Media Upload</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input[type=file]{
margin-bottom:15px;
}

button{
padding:10px 15px;
border:none;
border-radius:5px;
background:#007bff;
color:white;
font-size:14px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#0056b3;
}

#status{
margin-top:10px;
font-size:14px;
color:#444;
}

#preview img,
#preview video{
margin-top:15px;
max-width:100%;
border-radius:8px;
}

#linkBox{
margin-top:15px;
display:none;
}

#link{
word-break:break-all;
font-size:13px;
color:#007bff;
margin-bottom:8px;
}

.copyBtn{
background:#28a745;
}

.copyBtn:hover{
background:#1e7e34;
}

</style>
</head>

<body>

<div class="container">

<h2>Upload Image / Video</h2>

<input type="file" id="fileInput" accept="image/*,video/*">

<br>

<button onclick="upload()">Upload</button>

<p id="status"></p>

<div id="preview"></div>

<div id="linkBox">
<p id="link"></p>
<button class="copyBtn" onclick="copyLink()">Copy Link</button>
</div>

</div>

<script>

const cloudName = "dfglchdhs";
const uploadPreset = "Vrajdatabase";

let uploadedURL = "";

async function upload(){

const file = document.getElementById("fileInput").files[0];

if(!file){
alert("Select file first");
return;
}

document.getElementById("status").innerText="Uploading...";

const formData = new FormData();
formData.append("file", file);
formData.append("upload_preset", uploadPreset);

const res = await fetch(
`https://api.cloudinary.com/v1_1/${cloudName}/auto/upload`,
{
method:"POST",
body:formData
});

const data = await res.json();

uploadedURL = data.secure_url;

document.getElementById("status").innerText="Upload Complete";

document.getElementById("link").innerText = uploadedURL;

document.getElementById("linkBox").style.display="block";

showPreview(uploadedURL);

}

function showPreview(url){

const preview = document.getElementById("preview");

preview.innerHTML="";

if(url.includes(".mp4") || url.includes(".webm") || url.includes(".mov")){
preview.innerHTML = `<video controls src="${url}"></video>`;
}
else{
preview.innerHTML = `<img src="${url}">`;
}

}

function copyLink(){

navigator.clipboard.writeText(uploadedURL);

alert("Link Copied");

}

</script>

</body>
</html>
